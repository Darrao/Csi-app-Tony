name: Deploy to AWS EC2 (Preprod)

on:
  push:
    branches:
      - preprod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: darrao/csi-app-tony/backend
  # Replace with your actual user/org name if needed, but github.repository handles it (e.g. Darrao/Csi-app-Tony)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./csi-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to GHCR on EC2
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Stop old container
            docker stop csi-backend || true
            docker rm csi-backend || true
            
            # Pull new image (using the branch tag 'preprod')
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:preprod
            
            # Run new container
            docker run -d \
              --name csi-backend \
              --restart always \
              -p 3000:3000 \
              -e PORT=3000 \
              -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e ADMIN_SECRET_KEY="${{ secrets.ADMIN_SECRET_KEY }}" \
              -e SMTP_USER="${{ secrets.SMTP_USER }}" \
              -e SMTP_PASS="${{ secrets.SMTP_PASS }}" \
              -e SMTP_HOST="${{ secrets.SMTP_HOST }}" \
              -e SMTP_PORT="${{ secrets.SMTP_PORT }}" \
              -e SMTP_SECURE="${{ secrets.SMTP_SECURE }}" \
              -e SMTP_REQUIRE_TLS="${{ secrets.SMTP_REQUIRE_TLS }}" \
              -v /home/${{ secrets.EC2_USER }}/uploads:/app/uploads \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:preprod
              
            # Cleanup unused images
            docker image prune -f
